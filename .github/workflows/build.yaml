name: README build

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }} # Cấu hình token ngay tại đây
          fetch-depth: 1

      - name: Get Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt

      - name: Update README file
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py

      - name: Commit and push changes
        env:
          USER_NAME: ${{ secrets.USER_NAME }}
        run: |-
          git config --global user.email "${{ secrets.USER_NAME }}@users.noreply.github.com"
          git config --global user.name "${{ secrets.USER_NAME }}"
          git add .
          git diff --staged || echo "No changes to diff"
          git commit -m "Updated README automatically" || echo "No changes to commit"
          git push origin main
